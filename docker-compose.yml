# Tessera — Docker-only workflow.
#
#   Local dev (hot reload):
#     docker compose up dev
#
#   Local production preview (nginx + built static assets):
#     docker compose --profile prod up --build app
#
#   One-shot tooling inside the dev image:
#     docker compose run --rm dev npm run typecheck
#     docker compose run --rm dev npm run lint
#
# Variables come from .env.local (gitignored). See .env.example.

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env.local
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    restart: unless-stopped

  app:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY:-}
    env_file:
      - .env.local
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  node_modules:
